<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活点地图 - The Marauder's Map</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/fonts.css?v=1.10">
  <link rel="stylesheet" href="css/style.css?v=1.10">
</head>
<body>

  <!-- 开场咒语界面 -->
  <div id="opening-screen">
    <div class="ot">
      Messrs Moony, Wormtail, Padfoot &amp; Prongs
      <span class="big">The Marauder's Map</span>
      Purveyors of Aids to Magical Mischief-Makers
    </div>
    <div class="sia">
      <p class="sh">请说出咒语以打开地图...</p>
      <input type="text" id="si" placeholder="I solemnly swear that I am up to no good" autocomplete="new-password" data-lpignore="true" autofocus>
      <br>
      <button class="sb" id="sbtn">施咒 ✦</button>
      <p class="se" id="serr"></p>
    </div>
  </div>

  <!-- 地图主体 -->
  <div id="mc">
    <div id="mw">
      <div class="parch">
        <div class="mh">
          <div class="st">Messrs Moony, Wormtail, Padfoot &amp; Prongs are proud to present</div>
          <h1>The Marauder's Map</h1>
          <div class="au">活点地图 — 霍格沃茨魔法学校</div>
        </div>
        <svg id="svg-map" width="2000" height="1600" xmlns="http://www.w3.org/2000/svg"></svg>
        <div id="cl"></div>
        <div id="tl"></div>
      </div>
    </div>
  </div>

  <!-- 楼层导航 -->
  <div class="fn" id="fn" style="display:none">
    <button class="fb active" data-floor="1">1F</button>
    <button class="fb" data-floor="2">2F</button>
    <button class="fb" data-floor="3">3F</button>
    <button class="fb" data-floor="4">地</button>
  </div>

  <!-- 角色信息卡片 -->
  <div class="ic" id="ic">
    <div class="ich">
      <div class="avatar" id="cavatar"></div>
      <div class="ich-info">
        <h3 id="cn"></h3>
        <span class="hb" id="ch"></span>
      </div>
    </div>
    <button class="cc" id="ccb">✕</button>
    <div class="icb">
      <div class="ics"><div class="sd"></div><span id="cloc"></span></div>
      <div class="ica" id="cact"></div>
      <div class="ca">
        <div class="cms" id="cms"></div>
        <div class="cir">
          <input class="ci" id="ci" placeholder="与此人对话...">
          <button class="csb" id="csb">发送</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 音乐控制 -->
  <button class="music-btn" id="music-btn" title="背景音乐" style="display:none">🔇</button>

  <!-- 关闭地图按钮 -->
  <button class="cmb" id="cmb" style="display:none">✦ Mischief Managed ✦</button>

  <!-- 小地图 -->
  <div class="mm" id="mm" style="display:none">
    <div class="mv" id="mmv"></div>
  </div>

  <!-- 主程序（ES Module） -->
  <script type="module" src="js/app.js?v=1.10"></script>
</body>
</html>
