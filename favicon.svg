<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 羊皮纸圆角背景 -->
  <rect width="64" height="64" rx="12" fill="#1a0e05"/>
  <rect x="4" y="4" width="56" height="56" rx="8" fill="#d4b896" opacity=".12"/>
  <rect x="6" y="6" width="52" height="52" rx="6" fill="none" stroke="#8a6a4a" stroke-width=".6" opacity=".3"/>
  <!-- 角落装饰 -->
  <path d="M10 10 Q14 10 14 14" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity=".5"/>
  <path d="M54 10 Q50 10 50 14" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity=".5"/>
  <path d="M10 54 Q14 54 14 50" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity=".5"/>
  <path d="M54 54 Q50 54 50 50" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity=".5"/>
  <!-- 脚印1（左） -->
  <g transform="translate(18,20) rotate(-15)" opacity=".9">
    <ellipse cx="0" cy="0" rx="5" ry="7" fill="#c9a84c"/>
    <circle cx="-4" cy="-8" r="2" fill="#c9a84c"/>
    <circle cx="-1" cy="-9.5" r="2" fill="#c9a84c"/>
    <circle cx="2.5" cy="-9" r="2" fill="#c9a84c"/>
    <circle cx="5" cy="-7" r="1.8" fill="#c9a84c"/>
  </g>
  <!-- 脚印2（右） -->
  <g transform="translate(34,34) rotate(-15)" opacity=".7">
    <ellipse cx="0" cy="0" rx="5" ry="7" fill="#c9a84c"/>
    <circle cx="-4" cy="-8" r="2" fill="#c9a84c"/>
    <circle cx="-1" cy="-9.5" r="2" fill="#c9a84c"/>
    <circle cx="2.5" cy="-9" r="2" fill="#c9a84c"/>
    <circle cx="5" cy="-7" r="1.8" fill="#c9a84c"/>
  </g>
  <!-- 脚印3（小，远处消隐） -->
  <g transform="translate(48,46) rotate(-15) scale(.6)" opacity=".4">
    <ellipse cx="0" cy="0" rx="5" ry="7" fill="#c9a84c"/>
    <circle cx="-4" cy="-8" r="2" fill="#c9a84c"/>
    <circle cx="-1" cy="-9.5" r="2" fill="#c9a84c"/>
    <circle cx="2.5" cy="-9" r="2" fill="#c9a84c"/>
    <circle cx="5" cy="-7" r="1.8" fill="#c9a84c"/>
  </g>
  <!-- 金色魔法微光 -->
  <circle cx="12" cy="50" r="1.2" fill="#e8c84c" opacity=".6"/>
  <circle cx="52" cy="16" r="1" fill="#e8c84c" opacity=".5"/>
  <circle cx="44" cy="12" r=".8" fill="#e8c84c" opacity=".4"/>
</svg>
